name: Clean HTML/CSS/JS (No Node Project)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node (CI only)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install linters (temporary)
        run: |
          npm install --no-save \
            eslint \
            prettier \
            htmlhint \
            stylelint \
            stylelint-config-standard \
            eslint-plugin-unused-imports \
            eslint-plugin-html

      # --- AUTO FIX EVERYTHING ---
      - name: Auto-fix JS, CSS, formatting
        run: |
          # JS cleanup (includes unused imports removal)
          npx eslint . \
            --ext .js \
            --fix \
            --env browser,es2021 \
            --parser-options ecmaVersion:latest \
            --plugin unused-imports \
            --rule 'no-unused-vars:["warn",{ "vars":"all","args":"after-used","ignoreRestSiblings":true,"varsIgnorePattern":"^_","argsIgnorePattern":"^_" }]' \
            --rule 'unused-imports/no-unused-imports:error'

          # Format everything
          npx prettier --write . \
            --single-quote \
            --semi \
            --tab-width 2 \
            --print-width 100

          # CSS fixes
          npx stylelint "**/*.css" \
            --fix \
            --config '{"extends":"stylelint-config-standard"}'

      # --- HTML VALIDATION ---
      - name: Validate HTML
        run: |
          npx htmlhint "**/*.html" \
            --rules tagname-lowercase,attr-lowercase,attr-value-double-quotes,doctype-first,tag-pair,id-unique

      # --- FINAL CHECK ---
      - name: Final lint check (fail if still broken)
        run: |
          npx eslint . --ext .js

      # --- COMMIT BACK ---
      - name: Commit & push fixes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No cleanup needed"
          else
            git commit -m "chore: clean html/css/js (auto-fix + unused removal)"
            git push
          fi
